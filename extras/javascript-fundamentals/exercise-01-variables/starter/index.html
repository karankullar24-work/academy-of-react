<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1: Wizard Character Sheet</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        background: #222740;
        padding: 40px 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      h1 { color: #222740; margin-bottom: 8px; }
      .subtitle { color: #6b7280; margin-bottom: 24px; }
      .output {
        background: #1e293b;
        color: #e2e8f0;
        padding: 20px;
        border-radius: 8px;
        font-family: "Courier New", monospace;
        font-size: 0.95rem;
        line-height: 1.8;
        min-height: 120px;
        white-space: pre-wrap;
      }
      .output .label { color: #94a3b8; }
      .output .value { color: #67e8f9; }
    </style>
  </head>

      <p class="subtitle">Variables, data types & template literals</p>
      <div id="output" class="output"></div>
